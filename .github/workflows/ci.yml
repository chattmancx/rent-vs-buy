name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test -- --run

      - name: Build
        run: pnpm build

      # Audit production dependencies only; fails on high/critical.
      # To suppress a specific advisory, add it to pnpm.auditConfig.ignoreCves in package.json
      # with a comment documenting the advisory ID and why it is acceptable.
      - name: Dependency audit
        run: pnpm audit --audit-level high --prod
